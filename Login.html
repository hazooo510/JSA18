<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Game World</title>
    <link rel="stylesheet" href="login_register.css"> </head>
<body class="login-bg">
   
    <div class="auth-box">
        <div class="logo"><img src="./img/Game studio.png" alt="Game Logo" width="70" height="70"></div>
        <h2>CHIẾN BINH TRỞ LẠI</h2>
        
        <form method="POST">
            <div class="field">
                <input type="text" name="username" id="username" placeholder="Tên tài khoản" required>
            </div>
            <div class="field">
                <input type="password" name="password" id="password" placeholder="Mật khẩu" required>
            </div>
            <button type="button" class="btn-neon" id="login-btn">VÀO TRẬN NGAY</button>
        </form>

        <div class="footer-text">
            Chưa có tài khoản? <a href="Register.html">Đăng ký tân thủ</a>
        </div>
    </div>
     <script src="Login.js"></script>
</body>
</html>
